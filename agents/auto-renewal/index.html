<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dyna.Ai auto renewal Agent demo." />
    <title>Dyna.Ai Agent Demo</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css?v=20260630-webcall" />
  </head>
  <body>
    <div class="site-shell agent-shell">
      <header class="site-header compact-header">
        <a class="brand" href="/">
          <span class="brand-mark">DA</span>
          <span>
            <span class="brand-name">Dyna.Ai</span>
            <span class="brand-subtitle" id="agentHeaderSubtitle"></span>
          </span>
        </a>
        <div class="header-actions is-inline">
          <a class="nav-back" href="/" id="backLink"></a>
          <div class="language-toggle" aria-label="Language switch">
            <button type="button" data-lang="ja">JP</button>
            <button type="button" data-lang="zh">CN</button>
          </div>
        </div>
      </header>
      <main class="agent-page">
        <section class="agent-hero">
          <div>
            <p class="section-kicker">Agent Demo</p>
            <h1 id="agentName"></h1>
            <p id="agentIntro"></p>
          </div>
          <div class="status-panel">
            <span id="statusLabel"></span>
            <strong id="apiStatus"></strong>
          </div>
        </section>
        <section class="chat-layout" aria-labelledby="conversationTitle">
          <div class="conversation-panel">
            <div class="chat-head">
              <h2 id="conversationTitle"></h2>
              <span id="agentIdBadge"></span>
            </div>
            <div class="message-list" id="messageList" aria-live="polite"></div>
          </div>
          <form class="composer-panel" id="chatForm">
            <label for="messageInput" id="inputLabel"></label>
            <textarea id="messageInput" rows="7"></textarea>
            <div class="composer-actions">
              <button class="button button-secondary voice-button" type="button" id="voiceButton"></button>
              <button class="button button-primary" type="submit" id="sendButton"></button>
            </div>
          </form>
        </section>
      </main>
    </div>
    <script src="/data.js?v=20260630-webcall"></script>
    <script src="/agent.js?v=20260630-webcall"></script>
  </body>
</html>
