<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dyna.Ai insurance industry AI Agent solution landing page and demo."
    />
    <title>Dyna.Ai Insurance Agent Solution</title>
    <link rel="icon" href="/favicon.svg" />
    <link rel="stylesheet" href="/styles.css?v=20260626-real-api" />
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="#hero" aria-label="Dyna.Ai">
          <span class="brand-mark">DA</span>
          <span>
            <span class="brand-name">Dyna.Ai</span>
            <span class="brand-subtitle" data-i18n="brandSubtitle"></span>
          </span>
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="siteNav">
          Menu
        </button>
        <div class="header-actions" id="siteNav">
          <nav class="site-nav" aria-label="Primary navigation"></nav>
          <div class="language-toggle" aria-label="Language switch">
            <button type="button" data-lang="ja">JP</button>
            <button type="button" data-lang="zh">CN</button>
          </div>
        </div>
      </header>

      <main>
        <section class="hero-section" id="hero">
          <div class="hero-copy">
            <p class="section-kicker" data-i18n="heroKicker"></p>
            <h1 data-i18n="heroTitle"></h1>
            <p class="hero-lead" data-i18n="heroLead"></p>
            <div class="action-row">
              <a class="button button-primary" href="#scenarios" data-i18n="primaryCta"></a>
              <a class="button button-secondary" href="#agents" data-i18n="secondaryCta"></a>
            </div>
          </div>
          <div class="brand-panel" aria-label="Dyna.Ai brand panel">
            <div class="panel-logo">Dyna.Ai</div>
            <div class="panel-line" data-i18n="brandLine"></div>
            <div class="panel-metrics">
              <span>RAG</span>
              <span>ASR</span>
              <span>TTS</span>
              <span>LLM</span>
            </div>
          </div>
        </section>

        <section class="value-section" aria-labelledby="valueTitle">
          <div class="section-intro">
            <h2 id="valueTitle" data-i18n="proofTitle"></h2>
            <p data-i18n="proofLead"></p>
          </div>
          <div class="value-grid" id="valueGrid"></div>
        </section>

        <section class="content-section" id="technology" aria-labelledby="technologyTitle">
          <div class="section-intro">
            <p class="section-kicker" data-i18n="technologyKicker"></p>
            <h2 id="technologyTitle" data-i18n="technologyTitle"></h2>
            <p data-i18n="technologyLead"></p>
          </div>
          <div class="technology-grid" id="technologyGrid"></div>
        </section>

        <section class="content-section scenario-section" id="scenarios" aria-labelledby="scenarioTitle">
          <div class="section-intro">
            <p class="section-kicker" data-i18n="scenarioKicker"></p>
            <h2 id="scenarioTitle" data-i18n="scenarioTitle"></h2>
            <p data-i18n="scenarioLead"></p>
          </div>
          <div class="scenario-list" id="scenarioList"></div>
        </section>

        <section class="content-section" id="agents">
          <div class="section-intro">
            <p class="section-kicker" data-i18n="agentsKicker"></p>
          </div>
          <div class="agent-grid" id="agentGrid"></div>
        </section>
      </main>

      <footer class="site-footer">
        <span data-i18n="footer"></span>
      </footer>
    </div>

    <script src="/data.js?v=20260626-real-api"></script>
    <script src="/script.js?v=20260626-real-api"></script>
  </body>
</html>
